version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - 'pr: dependencies'
    versioning-strategy: increase
    groups:
      changesets:
        patterns: ['@changesets/*']
      csstools-parser:
        patterns: ['@csstools/*']
        exclude-patterns:
          ['@csstools/selector-specificity', '@csstools/css-syntax-patches-for-csstree']
      csstree:
        patterns: ['css-tree', '@csstools/css-syntax-patches-for-csstree']
      eslint:
        patterns: ['eslint', 'eslint-*']
      jest:
        patterns: ['jest', 'jest-*', '@jest/*']
      postcss:
        patterns: ['postcss', 'postcss-*']
      stylelint:
        patterns: ['@stylelint/*']
      typescript:
        patterns: ['typescript', '@types/*']
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - 'pr: dependencies'
    cooldown:
      default-days: 7
      exclude: ['stylelint/.github/*']
