name: Release PR

on:
  workflow_dispatch:

jobs:
  release-pr:
    uses: stylelint/.github/.github/workflows/call-release-pr.yml@38848ee8badc3888f246692cc371d519616d74e2 # 0.9.0
    with:
      new-version-command: npm run changeset
    permissions:
      contents: write
      pull-requests: write
