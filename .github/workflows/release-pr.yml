name: Release PR

on:
  workflow_dispatch:

jobs:
  release-pr:
    uses: stylelint/.github/.github/workflows/call-release-pr.yml@61e84671c2d4d7af47353e7f5289a2df81bd681d # 0.7.0
    with:
      new-version-command: npm run changeset
    permissions:
      contents: write
      pull-requests: write
